    - article [ref=e26]:
      - paragraph [ref=e27]: This is the site of Shomodip De. I write about Productivity, AI and the Human Condition in the 21st Century.
      - paragraph [ref=e28]: I am a Product Manager by Profession. I have built and managed B2B Platform products in Enterprise Ontology, Enterprise Data Productization and Context Management.
      - paragraph [ref=e29]: I am interested in the topic of Anthropic Exceptionalism. The uncanny human ability to create Knowledge beyond what evolution encoded into us (Memetic Knowledge Creation as opposed to Genetic Knowledge Creation) and it’s emergent characteristics like Creativity, Critical Optimism, Free Will, and the Will to Infinity.
      - paragraph [ref=e30]: My strongest influences include David Deutsch, Steve Jobs, Friedrich Nietzsche and JRR Tolkien. The aesthetic of my philosophy is influenced by Bhadralok Intellectualism, which itself is a form of Sanskrit Intellectual Worldview.
      - paragraph [ref=e31]: This site is an evolving and navigable encyclopedia of my Prose as well as the Products I build.
      - paragraph [ref=e32]: "If you want to point your AI to this Site or export a Markdown snapshot of the entire site as a wiki, visit:"
