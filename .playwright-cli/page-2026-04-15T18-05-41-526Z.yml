      - article [ref=e46]:
        - paragraph [ref=e47]:
          - text: Human beings are interesting not because we are the strongest animals, but because we can create
          - link "explanatory knowledge" [ref=e48] [cursor=pointer]:
            - /url: "#"
          - text: that no genome directly encoded for us. That is the discontinuity I mean by anthropic exceptionalism. It is not mysticism. It is the simple observation that criticism, conjecture, and cultural accumulation let us reach beyond our starting conditions.
        - paragraph [ref=e49]:
          - text: For popup-chain testing on this page, you can also jump to
          - link "Karl Popper" [ref=e50] [cursor=pointer]:
            - /url: https://en.wikipedia.org/wiki/Karl_Popper
            - text: Karl Popper
            - img [ref=e51]
          - text: ","
          - link "critical rationalism" [ref=e53] [cursor=pointer]:
            - /url: https://en.wikipedia.org/wiki/Critical_rationalism
            - text: critical rationalism
            - img [ref=e54]
          - text: ","
          - link "evolutionary epistemology" [ref=e56] [cursor=pointer]:
            - /url: https://en.wikipedia.org/wiki/Evolutionary_epistemology
            - text: evolutionary epistemology
            - img [ref=e57]
          - text: ", and"
          - link "cultural evolution" [ref=e59] [cursor=pointer]:
