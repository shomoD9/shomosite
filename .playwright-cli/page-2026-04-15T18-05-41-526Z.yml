    - generic [ref=e137]:
      - paragraph [ref=e138]:
        - text: Critical rationalism is
        - link "Karl Popper" [ref=e139] [cursor=pointer]:
          - /url: /wiki/Karl_Popper
        - text: "'s answer to what he considered the most important problems of epistemology and"
        - link "philosophy of science" [ref=e140] [cursor=pointer]:
          - /url: /wiki/Epistemology
        - text: ": the problems of the growth of knowledge, notably by induction, and the demarcation of science. He adopted a"
        - link "fallibilist" [ref=e141] [cursor=pointer]:
          - /url: /wiki/Fallibilism
        - text: approach to these problems, especially that of induction, without falling into skepticism. His approach was to put in perspective the distinctive role of deductive logic in the development of knowledge, especially in science, in the context of a less rigorous methodology based on
        - link "critical thinking" [ref=e142] [cursor=pointer]:
          - /url: /wiki/Critical_thinking
        - text: . The central technical concept in the application of critical rationalism to science is
        - link "falsifiability" [ref=e143] [cursor=pointer]:
          - /url: /wiki/Falsifiability
        - text: . Popper first mentioned the term "critical rationalism" in
        - link "The Open Society and Its Enemies" [ref=e145] [cursor=pointer]:
          - /url: /wiki/The_Open_Society_and_Its_Enemies
        - text: (1945) and also later in
        - link "Conjectures and Refutations" [ref=e147] [cursor=pointer]:
          - /url: /wiki/Conjectures_and_Refutations
        - text: (1963),
        - link "Unended Quest" [ref=e149] [cursor=pointer]:
          - /url: /wiki/Unended_Quest
        - text: (1976), and
        - link "The Myth of the Framework" [ref=e151] [cursor=pointer]:
          - /url: /wiki/The_Myth_of_the_Framework
        - text: (1994).
      - paragraph [ref=e152]: Popper admitted that the truth of statements cannot be obtained using only logical definitions and deductions, as this leads to an infinite regress. For Popper, this does not prevent statements from being useful for solving problems, because they can be logically analyzed to draw logical consequences, possibly contradictions with observation statements linked to real tests. Popper wrote that the bulk of scientific activities use deductive logic to evaluate theories.