        - heading "The Discontinuity" [level=2] [ref=e62]:
          - text: The Discontinuity
          - link [ref=e63] [cursor=pointer]:
            - /url: "#the-discontinuity"
            - img [ref=e64]
        - paragraph [ref=e67]:
          - text: Other animals inherit strategies. Human beings inherit a
          - link "criticism engine" [ref=e68] [cursor=pointer]:
            - /url: "#"
          - text: that lets us treat our own ideas as corrigible objects. That capacity turns culture into a real source of new knowledge rather than a mere transmission channel for instinct.
        - paragraph [ref=e69]: This is why intelligence cannot be reduced to present capability alone. What matters is whether a mind can enter an ecology where conjecture, criticism, and correction accumulate across generations.
        - heading "Why Scale Is Not Enough" [level=2] [ref=e70]:
          - text: Why Scale Is Not Enough
          - link [ref=e71] [cursor=pointer]:
            - /url: "#why-scale-is-not-enough"
            - img [ref=e72]
        - paragraph [ref=e75]: The practical consequence is that AI should not be discussed merely as a labor substitute. It should be discussed as a new participant in the ecology through which explanatory knowledge is made, challenged, and reorganized.
        - paragraph [ref=e76]: Pure scale matters, but scale without a surrounding culture of error correction only gives us a larger pattern compressor. The stronger question is whether our tools can participate in the social machinery through which explanations are formed, attacked, and improved.
        - heading "Intelligence Inside Institutions" [level=3] [ref=e77]:
          - text: Intelligence Inside Institutions
          - link [ref=e78] [cursor=pointer]:
            - /url: "#intelligence-inside-institutions"
            - img [ref=e79]
        - paragraph [ref=e82]:
          - text: The real discontinuity shows up inside institutions. A society that preserves
          - link "cultural accumulation" [ref=e83] [cursor=pointer]:
            - /url: "#"
          - text: can out-think any one individual because criticism gets stored, reused, and recombined.
        - paragraph [ref=e84]:
          - text: That is why the
          - link "design page" [ref=e85] [cursor=pointer]:
            - /url: ../../docs/design
          - text: "for a public thinking system matters at all: the surface is not ornament around the ideas. The surface decides whether arguments remain inspectable, linkable, and easy to challenge."
        - heading "Consequence for Product Work" [level=2] [ref=e86]:
          - text: Consequence for Product Work
          - link [ref=e87] [cursor=pointer]:
            - /url: "#consequence-for-product-work"
            - img [ref=e88]
        - paragraph [ref=e91]: If this argument is right, then even a small public site should behave less like a portfolio and more like a durable reasoning environment. That is also why this site is being shaped as a reading system rather than a landing page.
    - complementary [ref=e93]:
