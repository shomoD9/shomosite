      - article [ref=e46]:
        - paragraph [ref=e47]:
          - text: Human beings are interesting not because we are the strongest animals, but because we can create
          - link "explanatory knowledge" [ref=e48] [cursor=pointer]:
            - /url: "#"
          - text: that no genome directly encoded for us. That is the discontinuity I mean by anthropic exceptionalism. It is not mysticism. It is the simple observation that criticism, conjecture, and cultural accumulation let us reach beyond our starting conditions.
        - paragraph [ref=e49]:
          - text: For popup-chain testing on this page, you can also jump to
